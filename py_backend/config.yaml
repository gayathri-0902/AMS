# =============================================================================
# ModularRAG Configuration
# =============================================================================
# Edit this file to change any setting without touching source code.
# All paths can be absolute or relative to the project root directory.
# =============================================================================

# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------
paths:
  base_dir: "E:/Documents/data_Science/AMS/py_backend"   # absolute project root
  db_dir: "chromadb"                                  # relative to base_dir
  embedding_model: "models/bge-m3"                    # relative to base_dir

# -----------------------------------------------------------------------------
# Retrieval settings
# -----------------------------------------------------------------------------
retrieval:
  vector_top_k: 5       # top-k results from the dense vector retriever
  bm25_top_k: 5         # top-k results from the BM25 sparse retriever
  fusion_top_k: 3       # final top-k results after RRF re-ranking
  num_queries: 1        # number of query variants (1 = no query expansion, huge speedup)

# -----------------------------------------------------------------------------
# Local LLM (QuantizedLocalLLM / HuggingFace + bitsandbytes)
# -----------------------------------------------------------------------------
local_llm:
  model: "meta-llama/Llama-3.2-3B-Instruct"
  max_new_tokens: 256
  context_window: 2048
  temperature: 0.1

# -----------------------------------------------------------------------------
# Ollama LLM (OllamaLoader — requires Ollama server running locally)
# -----------------------------------------------------------------------------
ollama_llm:
  model: "qwen3:8b"
  request_timeout: 600.0
  context_window: 4096
  temperature: 0.3

# -----------------------------------------------------------------------------
# Gradio Remote LLM (GradioLoader — requires the Gradio notebook running on
# the 4× RTX 2080 Ti server.  Set base_url to the LAN IP shown by demo.launch)
# -----------------------------------------------------------------------------
gradio_llm:
  base_url: "http://127.0.0.1:7860"   # ← replace with server LAN IP e.g. http://192.168.1.50:7860
  context_window: 8192
  max_new_tokens: 1024
  temperature: 0.2
  timeout: 120.0                       # seconds to wait for a response

# -----------------------------------------------------------------------------
# Pipeline defaults  (used by query_engine.py __main__ block)
# -----------------------------------------------------------------------------
pipeline:
  year: 4
  branch: "ds"
  llm_backend: "gradio"   # "local" = QuantizedLocalLLM | "ollama" = OllamaLoader | "gradio" = GradioLoader
  streaming: true         # true only works with ollama backend; gradio falls back to blocking
  test_query: "Different types of organizational behaviour models in detail?"
